<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  #game-wrapper {
    display: flex;
    gap: 20px;
    align-items: stretch;
  }
  #canvas-container {
    position: relative;
    border: 3px solid #444;
    box-shadow: 0 0 30px rgba(0, 150, 0, 0.3);
  }
  canvas {
    display: block;
    background: #1a1a1a;
  }
  #sidebar {
    background: #1a1a1a;
    border: 2px solid #444;
    padding: 20px;
    color: #0f0;
    width: 200px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    font-size: 14px;
  }
  #sidebar h1 {
    font-size: 20px;
    text-align: center;
    color: #ff0;
    text-shadow: 0 0 10px #ff0;
    letter-spacing: 4px;
    border-bottom: 1px solid #444;
    padding-bottom: 10px;
  }
  .stat { display: flex; justify-content: space-between; }
  .stat-label { color: #aaa; }
  .stat-value { color: #0f0; font-weight: bold; }
  #lives { color: #f00; font-size: 18px; letter-spacing: 4px; }
  #level-info { color: #0ff; }
  #controls {
    font-size: 11px;
    color: #666;
    margin-top: auto;
    line-height: 1.8;
  }
  #controls span { color: #ff0; }
  #overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(0,0,0,0.8);
    pointer-events: none;
  }
  #overlay.hidden { display: none; }
  #overlay h2 {
    font-size: 36px;
    color: #ff0;
    text-shadow: 0 0 20px #ff0;
    margin-bottom: 20px;
  }
  #overlay p {
    color: #0f0;
    font-size: 16px;
    margin-bottom: 20px;
  }
  #overlay button {
    padding: 12px 30px;
    font-size: 18px;
    background: #333;
    color: #0f0;
    border: 2px solid #0f0;
    cursor: pointer;
    pointer-events: auto;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
  }
  #overlay button:hover {
    background: #0f0;
    color: #000;
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="canvas-container">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h2>🎮 坦克大战</h2>
      <p>保护基地，消灭敌人！</p>
      <button id="start-btn">开始游戏</button>
    </div>
  </div>
  <div id="sidebar">
    <h1>⚙ 坦克大战</h1>
    <div class="stat"><span class="stat-label">关卡</span><span class="stat-value" id="level-info">1</span></div>
    <div class="stat"><span class="stat-label">分数</span><span class="stat-value" id="score-display">0</span></div>
    <div class="stat"><span class="stat-label">击毁</span><span class="stat-value" id="kills-display">0</span></div>

    <div class="stat"><span class="stat-label">生命</span><span class="stat-value" id="lives">♥♥♥</span></div>
    <div id="controls">

      <span>空格 / J</span> 开火<br>
      <span>P</span> 暂停<br>
      <span>R</span> 重新开始

  </div>
</div>

// --- 按键 ---
const keys = {};
let firePressed = false;

// --- 音效（节流） ---
let audioCtx = null;
let lastBeepTime = 0;
const BEEP_MIN_INTERVAL = 30; // ms between beeps

function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      audioCtx = null;
    }
  }
}

function playBeep(freq, duration, type, vol) {
  if (!audioCtx) return;
  var now = performance.now();
  if (now - lastBeepTime < BEEP_MIN_INTERVAL) return;
  lastBeepTime = now;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.06;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) { /* ignore */ }
}

// --- 地图 ---
function getMapForLevel(lv) {
  var idx = (lv - 1) % MAPS.length;
  return MAPS[idx].map(function(row) { return row.slice(); });
}

function initMap() {
  map = getMapForLevel(level);
  // 放置基地
  var bx = Math.floor(COLS / 2) - 1;
  map[ROWS - 1][bx] = 3;
  map[ROWS - 1][bx + 1] = 3;
  // 基地周围全部用钢铁围住（U形保护）
  // 底部已有基地，在左边、右边、上边放钢铁
  if (bx - 1 >= 0) {
    map[ROWS - 1][bx - 1] = 2;       // 基地左下角
    map[ROWS - 2][bx - 1] = 2;       // 左上
  }
  if (bx + 2 < COLS) {
    map[ROWS - 1][bx + 2] = 2;       // 基地右下角
    map[ROWS - 2][bx + 2] = 2;       // 右上
  }
  map[ROWS - 2][bx] = 2;             // 基地正上方左
  map[ROWS - 2][bx + 1] = 2;         // 基地正上方右
}

// --- 坦克 ---
function Tank(x, y, dir, color, isPlayer) {
  this.x = x;
  this.y = y;
  this.dir = dir;
  this.color = color;
  this.speed = isPlayer ? TANK_SPEED : ENEMY_SPEED;
  this.isPlayer = !!isPlayer;
  this.width = isPlayer ? (TILE - 6) * 0.8 : TILE - 6;
  this.height = isPlayer ? (TILE - 6) * 0.8 : TILE - 6;
  this.fireCooldown = 0;
  this.active = true;
  this.stuckTimer = 0;
  this.walkFrame = 0;
  this.aiDir = dir;
  this.aiChangeTimer = 0;
}

Tank.prototype = {
  get rect() {
    var hw = this.width / 2;
    var hh = this.height / 2;
    return { x: this.x - hw, y: this.y - hh, w: this.width, h: this.height };
  },

  centerX: function() { return this.x; },
  centerY: function() { return this.y; },

  update: function() {
    if (this.fireCooldown > 0) this.fireCooldown--;
  },

  aiUpdate: function() {
    this.aiChangeTimer--;

    if (this.aiChangeTimer <= 0 || this.stuckTimer > 30) {
      // 随机选方向，有概率朝向玩家
      var dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
      if (player && player.active && Math.random() < 0.45) {
        var dx = player.x - this.x;
        var dy = player.y - this.y;
        var preferred = [];
        if (Math.abs(dx) > Math.abs(dy)) {
          preferred.push(dx > 0 ? DIR.RIGHT : DIR.LEFT);
          preferred.push(dy > 0 ? DIR.DOWN : DIR.UP);
        } else {
          preferred.push(dy > 0 ? DIR.DOWN : DIR.UP);
          preferred.push(dx > 0 ? DIR.RIGHT : DIR.LEFT);
        }
        // 50% 选最佳方向，50% 随机
        this.aiDir = Math.random() < 0.5 ? preferred[0] : dirs[Math.floor(Math.random() * 4)];
      } else {
        this.aiDir = dirs[Math.floor(Math.random() * 4)];
      }
      this.aiChangeTimer = 30 + Math.floor(Math.random() * 70);
      this.stuckTimer = 0;
    }

    this.dir = this.aiDir;
    var moved = this.move(this.speed);
    if (!moved) {
      this.stuckTimer++;
    } else {
      this.stuckTimer = 0;
    }

    // 开火
    if (this.fireCooldown <= 0 && Math.random() < 0.02) {
      this.fire();
    }
  },

  move: function(distance) {
    var nx = this.x;
    var ny = this.y;
    switch (this.dir) {
      case DIR.UP: ny -= distance; break;
      case DIR.DOWN: ny += distance; break;
      case DIR.LEFT: nx -= distance; break;
      case DIR.RIGHT: nx += distance; break;
    }

    var hw = this.width / 2;
    var hh = this.height / 2;
    var r = { x: nx - hw, y: ny - hh, w: this.width, h: this.height };

    // 边界
    if (r.x < 1 || r.x + r.w > canvas.width - 1 || r.y < 1 || r.y + r.h > canvas.height - 1) {
      return false;
    }

    // 地图碰撞
    var left = Math.floor(r.x / TILE);
    var right = Math.floor((r.x + r.w - 0.01) / TILE);
    var top = Math.floor(r.y / TILE);
    var bottom = Math.floor((r.y + r.h - 0.01) / TILE);

    for (var row = top; row <= bottom; row++) {
      for (var col = left; col <= right; col++) {
        if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return false;
        var tile = map[row][col];
        if (tile === 1 || tile === 2) return false;
        if (tile === 3 && !this.isPlayer) return false;
      }
    }

    // 坦克间碰撞
    var allTanks = this.isPlayer ? enemies : [player].concat(enemies);
    for (var i = 0; i < allTanks.length; i++) {
      var t = allTanks[i];
      if (!t || !t.active || t === this) continue;
      var tr = t.rect;
      if (r.x < tr.x + tr.w && r.x + r.w > tr.x && r.y < tr.y + tr.h && r.y + r.h > tr.y) {
        return false;
      }
    }

    this.x = nx;
    this.y = ny;
    return true;
  },

  fire: function() {
    if (this.fireCooldown > 0) return;

    // 限制玩家子弹
    if (this.isPlayer) {
      var count = 0;
      for (var i = 0; i < bullets.length; i++) {
        if (bullets[i].isPlayer) count++;
      }
      if (count >= 2) return;
    }

    bullets.push(new Bullet(this.x, this.y, this.dir, this.isPlayer));
    this.fireCooldown = this.isPlayer ? 0 : 45;

    if (this.isPlayer) {
      playBeep(800, 0.08, 'square', 0.04);
    }
  },

  draw: function(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);

    // 无敌闪烁
    if (this.isPlayer && playerInvincible > 0 && Math.floor(playerInvincible / 3) % 2 === 0) {
      ctx.globalAlpha = 0.35;
    }

    if (this.isPlayer) {
      // 真人泳装美女（不旋转，始终面朝玩家视角）
      this.drawGirl(ctx);
    } else {
      // 敌方坦克
      this.drawTank(ctx);
    }

    ctx.restore();
  },

  drawGirl: function(ctx) {
    // 使用真实泳装美女图片，始终面朝前方
    var moving = keys['w'] || keys['arrowup'] || keys['s'] || keys['arrowdown'] ||
                 keys['a'] || keys['arrowleft'] || keys['d'] || keys['arrowright'];
    if (moving) {
      this.walkFrame = (this.walkFrame || 0) + 0.15;
    }
    var walkPhase = Math.sin((this.walkFrame || 0) * Math.PI);
    var bounceY = walkPhase * 3; // 走路时上下浮动

    var w = this.width;
    var h = this.height;

    if (playerImg && playerImg.complete && playerImg.naturalWidth > 0) {
      ctx.drawImage(playerImg, -w/2, -h/2 + bounceY, w, h);
    } else {
      // 备用：如果图片没加载好，显示粉色圆圈
      ctx.fillStyle = '#ff6688';
      ctx.beginPath();
      ctx.arc(0, bounceY, w/2, 0, Math.PI * 2);
      ctx.fill();
    }
  },

  drawTank: function(ctx) {
    var angles = [0, Math.PI / 2, Math.PI, -Math.PI / 2];
    ctx.rotate(angles[this.dir]);

    var hw = this.width / 2;
    var hh = this.height / 2;

    // 履带
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(-hw, -hh, hw * 0.45, this.height);
    ctx.fillRect(hw * 0.55, -hh, hw * 0.45, this.height);

    // 履带纹理
    ctx.fillStyle = '#4a4a4a';
    for (var i = -hh + 4; i < hh - 2; i += 6) {
      ctx.fillRect(-hw, i, hw * 0.45, 2);
      ctx.fillRect(hw * 0.55, i, hw * 0.45, 2);
    }

    // 车身
    ctx.fillStyle = this.color;
    ctx.fillRect(-hw * 0.3, -hh + 2, hw * 0.6, this.height - 4);

    // 炮塔
    ctx.fillStyle = this.isPlayer ? '#0f0' : '#e55';
    ctx.beginPath();
    ctx.arc(0, 0, hw * 0.32, 0, Math.PI * 2);
    ctx.fill();

    // 炮管
    ctx.fillStyle = this.isPlayer ? '#0a0' : '#b33';
    ctx.fillRect(-2, -hh - 4, 4, hh + 4);
  }
};

// --- 子弹 ---
function Bullet(x, y, dir, isPlayer) {
  this.x = x;
  this.y = y;
  this.dir = dir;
  this.isPlayer = !!isPlayer;
  this.speed = this.isPlayer ? BULLET_SPEED * 2 : BULLET_SPEED;
  this.alive = true;
  this.size = 4;
}

Bullet.prototype.update = function() {
  switch (this.dir) {
    case DIR.UP: this.y -= this.speed; break;
    case DIR.DOWN: this.y += this.speed; break;
    case DIR.LEFT: this.x -= this.speed; break;
    case DIR.RIGHT: this.x += this.speed; break;
  }

  // 边界
  if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
    this.alive = false;
    return;
  }

  // 地图碰撞
  var col = Math.floor(this.x / TILE);
  var row = Math.floor(this.y / TILE);
  if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
    var tile = map[row][col];
    if (tile === 2) {
      this.alive = false;
      spawnParticles(this.x, this.y, '#aaa', 4);
      playBeep(200, 0.06, 'triangle', 0.03);
      return;
    }
    if (tile === 1) {
      map[row][col] = 0;
      this.alive = false;
      spawnParticles(this.x, this.y, '#c84', 6);
      playBeep(150, 0.08, 'square', 0.03);
      return;
    }
    if (tile === 3) {
      map[row][col] = 0;
      this.alive = false;
      baseAlive = false;
      spawnParticles(this.x, this.y, '#f00', 20);
      playBeep(60, 0.4, 'sawtooth', 0.1);
      return;
    }
  }

  // 坦克碰撞
  if (this.isPlayer) {
    for (var i = 0; i < enemies.length; i++) {
      var enemy = enemies[i];
      if (!enemy.active) continue;
      var er = enemy.rect;
      if (this.x >= er.x && this.x <= er.x + er.w && this.y >= er.y && this.y <= er.y + er.h) {
        this.alive = false;
        enemy.active = false;
        kills++;
        enemiesRemaining--;
        score += 100;
        spawnParticles(enemy.x, enemy.y, '#f80', 12);
        playBeep(300, 0.15, 'sawtooth', 0.06);
        updateUI();
        return;
      }
    }
  } else {
    // 玩家无敌模式：敌人子弹不造成伤害
    // （如需恢复伤害，取消下面注释并删除 return）
    // if (player && player.active && playerInvincible <= 0) {
    //   var pr = player.rect;
    //   if (this.x >= pr.x && this.x <= pr.x + pr.w && this.y >= pr.y && this.y <= pr.y + pr.h) {
    //     this.alive = false;
    //     playerHit();
    //   }
    // }
    return;
  }
};

Bullet.prototype.draw = function(ctx) {
  ctx.fillStyle = this.isPlayer ? '#ff0' : '#f66';
  ctx.shadowColor = this.isPlayer ? '#ff0' : '#f66';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
};

// --- 粒子 ---
function Particle(x, y, color) {
  this.x = x;
  this.y = y;
  this.color = color;
  this.vx = (Math.random() - 0.5) * 5;
  this.vy = (Math.random() - 0.5) * 5;
  this.life = 15 + Math.floor(Math.random() * 12);
  this.maxLife = this.life;
}

Particle.prototype.update = function() {
  this.x += this.vx;
  this.y += this.vy;
  this.vx *= 0.93;
  this.vy *= 0.93;
  this.life--;
};

Particle.prototype.draw = function(ctx) {
  var alpha = this.life / this.maxLife;
  ctx.fillStyle = this.color;
  ctx.globalAlpha = alpha;
  ctx.fillRect(this.x - 1.5, this.y - 1.5, 3, 3);
  ctx.globalAlpha = 1;
};

var MAX_PARTICLES = 200;
function spawnParticles(x, y, color, count) {
  var room = MAX_PARTICLES - particles.length;
  if (room <= 0) return;
  count = Math.min(count, room);
  for (var i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color));
  }
}

// --- 玩家受伤 ---
function playerHit() {
  if (playerInvincible > 0) return;
  lives--;
  playerInvincible = 90;
  spawnParticles(player.x, player.y, '#0f0', 15);
  playBeep(100, 0.25, 'sawtooth', 0.08);

  // 重置位置
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.dir = DIR.UP;

  updateUI();

  if (lives <= 0) {
    player.active = false;
    endGame(false);
  }
}

// --- 生成敌人 ---
function trySpawnEnemy() {
  if (enemiesSpawned >= enemiesToSpawn) return false;
  if (spawnCooldown > 0) {
    spawnCooldown--;
    return false;
  }

  var aliveCount = 0;
  for (var i = 0; i < enemies.length; i++) {
    if (enemies[i].active) aliveCount++;
  }
  if (aliveCount >= MAX_ENEMIES_ON_SCREEN) return false;

  var spawns = [
    { x: TILE * 0.5, y: TILE * 0.5 },
    { x: canvas.width / 2, y: TILE * 0.5 },
    { x: canvas.width - TILE * 0.5, y: TILE * 0.5 },
  ];

  // 随机打乱
  for (var i = spawns.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = spawns[i]; spawns[i] = spawns[j]; spawns[j] = tmp;
  }

  for (var s = 0; s < spawns.length; s++) {
    var sp = spawns[s];
    var blocked = false;
    var all = [player].concat(enemies);
    for (var t = 0; t < all.length; t++) {
      var tank = all[t];
      if (!tank || !tank.active) continue;
      if (Math.abs(tank.x - sp.x) < TILE * 1.2 && Math.abs(tank.y - sp.y) < TILE * 1.2) {
        blocked = true;
        break;
      }
    }
    if (!blocked) {
      var colors = ['#e55', '#e85', '#d5d', '#5ad', '#e94'];
      var color = colors[Math.floor(Math.random() * colors.length)];
      var enemy = new Tank(sp.x, sp.y, DIR.DOWN, color, false);
      enemies.push(enemy);
      enemiesSpawned++;
      spawnCooldown = 30;
      updateUI();
      return true;
    }
  }
  return false;
}

// --- 结束游戏 ---
function endGame(won) {
  if (!gameRunning) return;
  gameRunning = false;
  gameOver = true;

  var overlay = document.getElementById('overlay');
  var h2 = overlay.querySelector('h2');
  var p = overlay.querySelector('p');
  var btn = document.getElementById('start-btn');

  overlay.classList.remove('hidden');
  if (won) {
    h2.textContent = '🎉 胜利！';
    p.textContent = '得分: ' + score + '  击毁: ' + kills;
  } else {
    h2.textContent = '💀 游戏结束';
    p.textContent = '得分: ' + score + '  击毁: ' + kills + '  到达第 ' + level + ' 关';
  }
  btn.textContent = '重新开始';
}

function nextLevel() {
  level++;
  enemiesToSpawn = ENEMIES_PER_LEVEL_BASE + (level - 1) * 2;
  enemiesSpawned = 0;
  enemiesRemaining = enemiesToSpawn;
  enemies = [];
  bullets = [];
  particles = [];
  spawnTimer = 0;
  spawnCooldown = 0;
  baseAlive = true;

  initMap();

  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.dir = DIR.UP;
  playerInvincible = 60;

  updateUI();
}

// --- UI ---
function updateUI() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('kills-display').textContent = kills;
  document.getElementById('level-info').textContent = level;
  document.getElementById('remaining-display').textContent = enemiesRemaining;
  document.getElementById('lives').textContent = '🛡 无敌';
}

// --- 主循环 ---
var FRAME = 0;

function update() {
  if (!gameRunning || gamePaused) return;
  FRAME++;

  // 无敌时间
  if (playerInvincible > 0) playerInvincible--;

  // 尝试生成敌人
  trySpawnEnemy();

  // 通关检测
  if (enemiesRemaining <= 0) {
    var anyAlive = false;
    for (var i = 0; i < enemies.length; i++) {
      if (enemies[i].active) { anyAlive = true; break; }
    }
    if (!anyAlive) {
      nextLevel();
      return;
    }
  }

  // 基地被摧毁
  if (!baseAlive) {
    endGame(false);
    return;
  }

  // 更新玩家
  if (player && player.active) {
    player.update();
    var moved = false;
    if (keys['w'] || keys['arrowup']) { player.dir = DIR.UP; moved = player.move(player.speed); }
    else if (keys['s'] || keys['arrowdown']) { player.dir = DIR.DOWN; moved = player.move(player.speed); }
    else if (keys['a'] || keys['arrowleft']) { player.dir = DIR.LEFT; moved = player.move(player.speed); }
    else if (keys['d'] || keys['arrowright']) { player.dir = DIR.RIGHT; moved = player.move(player.speed); }

    if (firePressed || keys[' '] || keys['j']) {
      player.fire();
    }
  }

  // 更新敌人
  for (var i = 0; i < enemies.length; i++) {
    var enemy = enemies[i];
    if (enemy.active) {
      enemy.update();
      enemy.aiUpdate();
    }
  }

  // 更新子弹（使用倒序循环因为可能在循环中修改数组）
  for (var i = bullets.length - 1; i >= 0; i--) {
    if (bullets[i].alive) {
      bullets[i].update();
    }
  }

  // 清理
  bullets = bullets.filter(function(b) { return b.alive; });
  enemies = enemies.filter(function(e) { return e.active; });
  particles = particles.filter(function(p) { return p.life > 0; });

  // 更新粒子
  for (var i = 0; i < particles.length; i++) {
    particles[i].update();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 地图
  for (var row = 0; row < ROWS; row++) {
    for (var col = 0; col < COLS; col++) {
      var x = col * TILE;
      var y = row * TILE;
      var tile = map[row][col];

      if (tile === 1) {
        // 砖墙
        ctx.fillStyle = '#b5651d';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(x + 1, y + 1, TILE / 2 - 1, TILE / 2 - 1);
        ctx.fillRect(x + TILE / 2, y + TILE / 2, TILE / 2 - 1, TILE / 2 - 1);
        ctx.strokeStyle = '#6b3410';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, TILE - 1, TILE - 1);
      } else if (tile === 2) {
        // 钢铁
        ctx.fillStyle = '#777';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#999';
        ctx.fillRect(x + 3, y + 3, TILE - 6, TILE - 6);
        ctx.fillStyle = '#555';
        ctx.fillRect(x + 7, y + 7, TILE - 14, TILE - 14);
      } else if (tile === 3) {
        // 基地
        ctx.fillStyle = '#ff0';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#111';
        ctx.fillRect(x + 5, y + 5, TILE - 10, TILE - 10);
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.arc(x + TILE / 2, y + TILE / 2, TILE / 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // 基地光晕
  for (var row = 0; row < ROWS; row++) {
    for (var col = 0; col < COLS; col++) {
      if (map[row][col] === 3) {
        ctx.strokeStyle = '#ff0';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(col * TILE + TILE / 2, row * TILE + TILE / 2, TILE / 3.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
  }

  // 坦克
  if (player) player.draw(ctx);
  for (var i = 0; i < enemies.length; i++) {
    if (enemies[i].active) enemies[i].draw(ctx);
  }

  // 子弹
  for (var i = 0; i < bullets.length; i++) {
    if (bullets[i].alive) bullets[i].draw(ctx);
  }

  // 粒子
  for (var i = 0; i < particles.length; i++) {
    particles[i].draw(ctx);
  }

  // 暂停提示
  if (gamePaused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 40px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停', canvas.width / 2, canvas.height / 2);
    ctx.textAlign = 'start';
  }
}

function gameLoop() {
  try {
    update();
    draw();
  } catch(e) {
    console.error('Game loop error:', e);
    gameRunning = false;
    gameOver = true;
    var overlay = document.getElementById('overlay');
    overlay.classList.remove('hidden');
    overlay.querySelector('h2').textContent = '⚠ 出错了';
    overlay.querySelector('p').textContent = '请刷新页面重试';
    document.getElementById('start-btn').textContent = '刷新页面';
  }
  animFrameId = requestAnimationFrame(gameLoop);
}

// --- 事件 ---
window.addEventListener('keydown', function(e) {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') {
    e.preventDefault();
    firePressed = true;
  }
  if (e.key.toLowerCase() === 'p') {
    if (gameRunning) gamePaused = !gamePaused;
  }
  if (e.key.toLowerCase() === 'r') {
    restartGame();
  }
});

window.addEventListener('keyup', function(e) {
  keys[e.key.toLowerCase()] = false;
  if (e.key === ' ') firePressed = false;
});

document.getElementById('start-btn').addEventListener('click', function() {
  initAudio();
  restartGame();
});

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) {
    initAudio();
    restartGame();
  }
});

// --- 初始化 & 重启 ---
function restartGame() {
  score = 0;
  kills = 0;
  lives = 3;
  level = 1;
  enemiesToSpawn = ENEMIES_PER_LEVEL_BASE;
  enemiesSpawned = 0;
  enemiesRemaining = enemiesToSpawn;
  enemies = [];
  bullets = [];
  particles = [];
  gameRunning = true;
  gamePaused = false;
  gameOver = false;
  playerInvincible = 60;
  baseAlive = true;
  spawnTimer = 0;
  spawnCooldown = 0;

  initMap();
  player = new Tank(canvas.width / 2, canvas.height / 2, DIR.UP, '#4a4', true);

  document.getElementById('overlay').classList.add('hidden');
  updateUI();
}

// --- 启动 ---
initMap();
player = new Tank(canvas.width / 2, canvas.height / 2, DIR.UP, '#4a4', true);
updateUI();
animFrameId = requestAnimationFrame(gameLoop);

})();
</script>
